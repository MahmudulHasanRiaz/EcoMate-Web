<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EcoMate POS</title>
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EcoMate POS" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />
    <link rel="manifest" href="/api/system-settings/pos-manifest" />

    <script>
      (function () {
        try {
          var apiBase = (function () {
            if (location.hostname.indexOf('localhost') === -1) return '/api';
            return 'http://localhost:4000/api';
          })();
          fetch(apiBase + '/system-settings/branding', { credentials: 'include', cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              if (!data) return;
              var favicon = data.adminFavicon || data.storefrontFavicon;
              if (favicon) {
                document.querySelectorAll('link[rel="icon"]').forEach(function (l) {
                  l.setAttribute('href', favicon);
                });
                var d = document.createElement('link');
                d.setAttribute('rel', 'icon');
                d.setAttribute('href', favicon);
                document.head.appendChild(d);
              }
            }).catch(function () {});
        } catch (_) {}
      })();
    </script>

    <!-- License-gated PWA teardown: unregister SW if mobile_distribution not active -->
    <script>
      (function () {
        try {
          var apiBase = (function () {
            if (location.hostname.indexOf('localhost') === -1) return '/api';
            return 'http://localhost:4000/api';
          })();
          fetch(apiBase + '/license/status', { credentials: 'include', cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              if (!data) return;
              var features = data.features || [];
              if (features.indexOf('*') !== -1 || features.indexOf('mobile_distribution') !== -1) return;
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                  regs.forEach(function (reg) { reg.unregister(); });
                });
              }
              var manifestLink = document.querySelector('link[rel="manifest"]');
              if (manifestLink) manifestLink.remove();
            })
            .catch(function () {});
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
