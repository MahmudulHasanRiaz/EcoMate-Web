name: Build Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize owner name
        id: meta
        run: |
          OWNER="${{ github.repository_owner }}"
          SHA="${{ github.sha }}"
          echo "owner_lower=${OWNER,,}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Build packages
        run: npx tsc -p packages/shared-types/tsconfig.json && npx tsc -p packages/license-engine/tsconfig.json && npx tsc -p packages/feature-flags/tsconfig.json

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/backend/prisma/schema.prisma

      - name: Build apps
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.owner_lower }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/ecomate-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/ecomate-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront image
        uses: docker/build-push-action@v5
        with:
          context: apps/storefront
          file: apps/storefront/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/ecomate-storefront:latest
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/ecomate-storefront:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/ecomate-admin:latest
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/ecomate-admin:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
