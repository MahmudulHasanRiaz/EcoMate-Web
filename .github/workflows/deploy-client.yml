name: Deploy to Client (Manual)

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Select the client to deploy'
        required: true
        type: choice
        options:
          - FIXEDPLUS

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.client }}
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve Webhook and Deploy
        env:
          CLIENT_NAME: ${{ github.event.inputs.client }}
          WEBHOOK_URL: ${{ secrets[format('PORTAINER_WEBHOOK_{0}', github.event.inputs.client)] }}
        run: |
          echo "Preparing deployment for client: $CLIENT_NAME"
          
          if [ -z "$WEBHOOK_URL" ]; then
            echo "❌ Error: GitHub Secret 'PORTAINER_WEBHOOK_$CLIENT_NAME' is not configured!"
            exit 1
          fi
          
          echo "Triggering Portainer Stack Redeploy for $CLIENT_NAME..."
          # এখানে HTTP status code এবং response message দেখুন
          HTTP_CODE=$(curl -w "%{http_code}" -s -o /tmp/response.txt -X POST -k "$WEBHOOK_URL")
          RESPONSE=$(cat /tmp/response.txt)
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response: $RESPONSE"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Deployment triggered successfully for $CLIENT_NAME! (HTTP $HTTP_CODE)"
          else
            echo "❌ Webhook request failed for $CLIENT_NAME! (HTTP $HTTP_CODE)"
            exit 1
          fi
