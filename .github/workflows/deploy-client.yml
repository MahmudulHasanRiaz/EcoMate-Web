name: Deploy Client

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Select the client to deploy'
        required: true
        type: choice
        options:
          - FIXEDPLUS
      plan:
        description: 'License plan (new clients only)'
        required: false
        type: choice
        options:
          - essential
          - growth
          - enterprise
          - ultimate
        default: 'enterprise'

jobs:
  build-and-deploy:
    name: Deploy ${{ github.event.inputs.client }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for client overlay
        id: overlay
        run: |
          if [ -d "clients/${{ github.event.inputs.client }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build apps
        run: npm run build
        env:
          LICENSE_CLIENT_ID: ${{ github.event.inputs.client }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build mobile APK (storefront)
        env:
          CLIENT: ${{ github.event.inputs.client }}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/mobile-builds/storefront/android" \
                   "${GITHUB_WORKSPACE}/mobile-builds/admin/android" \
                   "${GITHUB_WORKSPACE}/mobile-builds/pos/android"
          cd "${GITHUB_WORKSPACE}/apps/capacitor/storefront"
          CAP_APP_NAME="${CLIENT} Store" CAP_APP_ID="com.ecomate.${CLIENT}.storefront" \
            npx cap add android --no-telemetry 2>/dev/null || true
          CAP_APP_NAME="${CLIENT} Store" CAP_APP_ID="com.ecomate.${CLIENT}.storefront" \
            npx cap copy --no-telemetry 2>/dev/null || true
          CAP_APP_NAME="${CLIENT} Store" CAP_APP_ID="com.ecomate.${CLIENT}.storefront" \
            npx cap sync --no-telemetry 2>/dev/null || true
          if [ -f "android/gradlew" ]; then
            (cd android && ./gradlew assembleRelease) || echo "Native build failed"
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp "android/app/build/outputs/apk/release/app-release.apk" \
              "${GITHUB_WORKSPACE}/mobile-builds/storefront/android/latest.apk"
            echo "APK built successfully"
          else
            echo "APK not produced — check Android SDK setup"
          fi
        continue-on-error: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecomate-backend:${{ github.event.inputs.client }}
            ghcr.io/${{ github.repository_owner }}/ecomate-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront image
        uses: docker/build-push-action@v5
        with:
          context: apps/storefront
          file: apps/storefront/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecomate-storefront:${{ github.event.inputs.client }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin image
        uses: docker/build-push-action@v5
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecomate-admin:${{ github.event.inputs.client }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via Portainer webhook
        env:
          CLIENT_NAME: ${{ github.event.inputs.client }}
          WEBHOOK_URL: ${{ secrets[format('PORTAINER_WEBHOOK_{0}', github.event.inputs.client)] }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook secret PORTAINER_WEBHOOK_$CLIENT_NAME configured."
            echo "Images pushed. Configure webhook and deploy manually via Portainer."
            exit 0
          fi

          echo "Triggering Portainer Stack Redeploy for $CLIENT_NAME..."
          RESPONSE_FILE=/tmp/response.txt
          MAX_TRIES=3
          TRY=1
          HTTP_CODE=0

          while [ $TRY -le $MAX_TRIES ]; do
            echo "Attempt $TRY of $MAX_TRIES..."
            HTTP_CODE=$(curl -w "%{http_code}" -s -S -o "$RESPONSE_FILE" -X POST -k --max-time 30 "$WEBHOOK_URL")
            RESPONSE=$(cat "$RESPONSE_FILE" 2>/dev/null || true)
            echo "HTTP Status Code: $HTTP_CODE"
            echo "Response: $RESPONSE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Deployment triggered successfully for $CLIENT_NAME! (HTTP $HTTP_CODE)"
              break
            fi

            if [ $TRY -lt $MAX_TRIES ]; then
              SLEEP_SEC=$((2 ** (TRY - 1)))
              echo "Request failed (HTTP $HTTP_CODE). Retrying in ${SLEEP_SEC}s..."
              sleep $SLEEP_SEC
            fi
            TRY=$((TRY + 1))
          done

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deployment completed (HTTP $HTTP_CODE)."
          else
            echo "Webhook request failed for $CLIENT_NAME after ${MAX_TRIES} attempts! (HTTP $HTTP_CODE)"
            exit 1
          fi
